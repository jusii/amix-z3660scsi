# <product-number>  <queue-func>  "<hardware name>"  <source under src/>  [probe=<func>]
# probe= : direct-probe fallback exported by the driver, called by sd.c init()
#          when bootinfo's autocon table misses the board (fixed-base boards,
#          unreliable 2.1 table on real metal).
0x144B0001  z3660queue  "Z3660 SCSI"  z3660.c  probe=z3660present
